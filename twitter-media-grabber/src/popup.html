<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Video Media Grabber</title>
</head>
<body>
  <h1>网页视频媒体抓取</h1>

  <section id="status" class="card">
    <div class="row"><span>页面视频</span><b id="st-videos">–</b></div>
    <div class="row"><span>已发现播放列表</span><b id="st-masters">–</b></div>
    <div class="row"><span>已捕获字幕段</span><b id="st-vtt">–</b></div>
  </section>

  <section class="card">
    <h2>字幕 / 文本</h2>
    <label class="fmt">格式
      <select id="sub-format">
        <option value="srt">SRT (.srt)</option>
        <option value="vtt">WebVTT (.vtt)</option>
        <option value="txt">纯文本 (.txt)</option>
      </select>
    </label>
    <button id="btn-subs" class="primary">抓取并下载字幕</button>
  </section>

  <section class="card">
    <h2>音频 / 转文字</h2>
    <label class="chk">
      <input type="checkbox" id="opt-transcribe" checked />
      停止后转写为文字（本地 Whisper）
    </label>
    <label class="fmt">识别语言
      <select id="opt-lang">
        <option value="auto">自动检测</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
      </select>
    </label>
    <button id="btn-audio-start" class="primary">开始录制音频</button>
    <button id="btn-audio-stop" class="danger" disabled>停止 · 下载 · 转写</button>
    <div id="st-transcribe" class="tstatus"></div>
  </section>

  <p id="msg" class="msg"></p>

  <details class="help">
    <summary>使用说明</summary>
    <ol>
      <li>在任意网页（如 twitter.com / x.com）打开视频并 <b>播放</b>。</li>
      <li>抓字幕：先在播放器里开启 <b>CC 字幕</b>，播放几秒后点“抓取并下载字幕”。</li>
      <li>录音频：视频播放中点“开始录制”，需要的片段播完后点“停止”。</li>
      <li>转文字：勾选“转写为文字”后，停止录制会在本地用 Whisper 识别，
          完成后自动下载 <b>.txt</b>（全文）和 <b>.srt</b>（带时间轴）。
          首次使用需下载约 40MB 模型，请耐心等待。</li>
    </ol>
  </details>

  <script src="popup.js"></script>
</body>
</html>
